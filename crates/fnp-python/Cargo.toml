[package]
name = "fnp-python"
version.workspace = true
edition.workspace = true
license-file.workspace = true

[lib]
name = "fnp_python"
crate-type = ["cdylib", "rlib"]

[features]
default = []
python-extension = ["pyo3/extension-module"]

[dependencies]
pyo3 = { version = "0.28.3", features = ["auto-initialize"] }
fnp-dtype = { path = "../fnp-dtype" }
fnp-iter = { path = "../fnp-iter" }
fnp-ndarray = { path = "../fnp-ndarray" }
fnp-ufunc = { path = "../fnp-ufunc" }
fnp-linalg = { path = "../fnp-linalg" }
fnp-random = { path = "../fnp-random" }
