test = false
doc = false
bench = false

[[bin]]
name = "fuzz_fix_unknown_dim"
path = "fuzz_targets/fuzz_fix_unknown_dim.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_as_strided"
path = "fuzz_targets/fuzz_as_strided.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_sliding_window"
path = "fuzz_targets/fuzz_sliding_window.rs"
test = false
doc = false
bench = false
